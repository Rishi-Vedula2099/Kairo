version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kairo-postgres
    environment:
      POSTGRES_USER: kairo
      POSTGRES_PASSWORD: kairo_password
      POSTGRES_DB: kairo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kairo-redis
    ports:
      - '6379:6379'

  # Temporal.io Services (Simplified for local dev)
  cassandra:
    image: cassandra:4.0
    container_name: temporal-cassandra
    ports:
      - "9042:9042"

  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: temporal-server
    ports:
      - "7233:7233"
    environment:
      - DB=cassandra
      - CASSANDRA_SEEDS=cassandra
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    depends_on:
      - cassandra

  temporal-ui:
    image: temporalio/ui:2.18.0
    container_name: temporal-ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

volumes:
  pgdata:
